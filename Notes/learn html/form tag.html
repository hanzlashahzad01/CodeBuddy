<html>
					<head>
					<title>form tag</title>
					</head>
<body>
	<form>
	
	<fieldset>
	
	<legend>Enter Your Personal Detail</legend>
	
	<label>Name</label> <input type="text" placeholder="Enter Your Name"><br/><br/>
	
	<label>Password</label> <input type="password"><br/><br/>
	
	<label>Gender</label> <input type="radio" name="gender" id="male"><label for="male">Male</label><input type="radio" name="gender" id="female"><label for="female">Female</label><br/><br/>

    <label>Hobbies</label> <input type="checkbox" name="hobby" id="music"><label for="music">Music</label> <input type="checkbox" name="hobby" id="photography"><label for="photography">Photography</label> <input type="checkbox" name="hobby" id="football"><label for="football">Football</label> <input type="checkbox" name="hobby" id="cricket"><label for="cricket">cricket</label> <input type="checkbox" name="hobby" id="snooker"><label for="snooker">snooker</label><br/><br/>

    <label>Message</label> <textarea rows="10" cols="60">Enter Your Message</textarea> <br/><br/>
    
	<label>Country</label> <select name="" size="3" multiple>
	
	       <option value="pk">Pakistan</option>
	       <option selected value="in">India</option>
	       <option value="ne">Nepal</option>
	       <option value="cn">China</option>
	       </select> <br/><br/>
		   
	<label>Cars</label> <select>
	
<optgroup label="toyota">
			<option>innova</option>
			<option>Etios</option>
			<option>Fortuner</option>
	
	
</optgroup>
			
<optgroup label="Renault">
			<option>kwid</option>
			<option>Duster</option>
			<option>Captur</option>
			
			
</optgroup>
	
	
	</select> <br/><br/>
	<label>Cars</label> <input list="cars">
	                   <datalist id="cars">
	
	<option>innova</option>
			<option>Etios</option>
			<option>Fortuner</option>
			<option>kwid</option>
			<option>Duster</option>
			<option>Captur</option>
			
	</datalist><br/><br/>
	
	<label>upload file</label> <input type="file" accept="image/*" name="" /><br/><br/>
	
	<input type="submit" value="save">
	
	<input type="reset" value="reset">
	
	
	<input type="image" src="images/hanzla.jpeg" width="20px alt="submit button"/>
	
	
	
	</fieldset>
	
	</form>
	





</body>


</html>
