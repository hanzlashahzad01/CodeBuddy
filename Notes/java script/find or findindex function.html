<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // find or findindex function.....

        var ages=[10,20,19,22];
        document.write(ages + "<br><br>");

        //working of find function....

        /*ye jo find name ka function ha ye sirf function kay sath hi use hota ha 
        ye agr function true hota ha to ye sirf array ki first 
        value ko check kary ga baki sari values ko chor dey ga...*/

    
        var b=ages.find(checkadult);
        document.write(b + "<br><br>");

        function checkadult(age){
            return age>18;
        }

        //findindex...

        /*findindex bhi same find ki taraha hi work karta
         ha bus ye array ki value nai us ka index bata ha bus....*/
         //note:- findindex mia index ka i jo ha wo capital hota ha....

         var Number=[21,45,67,89];
         document.write(Number+ "<br><br>");

         var y=Number.findIndex(greatervalue);
         document.write(y + "<br><br>");

         function greatervalue(numbers){
            return numbers>45;
         }

    </script>
</body>
</html>
