<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //tostring , valueof & fill method.....

        /*tostring ka kam ye ha kay jo array ki value ko
         hum print karwty hain ye tostring us ko string mia convert kar dey ga .....
         */

         var a=["hanzla","salman","umer","alisha"];

         a.toString();

         document.write(a +"<br><br>");

         //of string...

         /* the valueof()method returns the array means that ye array ki sari values ko hi
          print karwa dey ga....this is defult function like document .write....  not important property...
          */

          var a=["hanzla","salman","umer","alisha"];

          document.write(a.valueOf() + "<br><br>")

         //fill function....

         /*fill() method fills all the elements in an array with a static value...
         means that ye array mia jo hum aik value ko add karin gy ye 
         sari jagha pr wohi print kar dey ga....
         */


         var a=["hanzla","salman","umer","alisha"];

         a.fill("hero");
         
         document.write(a);


        
    </script>
</body>
</html>
