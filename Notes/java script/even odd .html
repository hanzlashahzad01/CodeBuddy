<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var x=1;

        //check even numbers...

        for(x=1;x<=10;x++)
        {
            if(x%2==0){
                document.write(x + "<br>");
            }
           // document.write(x + "<br>");
        }

        //check odd numbers...

        for(i=1;i<=10;i++)
        {
            if(i%2!=0){
                document.write(i + "<br>");

            }
           
        }


    </script>
    
</body>
</html>
