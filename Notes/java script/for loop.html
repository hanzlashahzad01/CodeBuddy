<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //for loop....

        //this loop is widely used programmers in codes etc....

        /* In this loop all these things write in one line such as initialize variable
        and then condition at the end increment etc....
        */

        var x=1;
        document.write("<ul>");

        for(x=1;x<10;x++)
        {
           
            document.write("<li>" + x + ") you are free now</li>");
            
        }
        document.write("</ul>");

        //decrement process....

        var a=10;
        document.write("<ul>");

        for(a=10;a>1;a--)
        {
           
            document.write("<li>" + a + ") you are free now</li>");
            
        }
        document.write("</ul>");
    
    
    </script>
</body>
</html>
