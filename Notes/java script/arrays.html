    <script>
        //array....

        var array=[10,20,30,40,50];
        var sum=0;
document.write("<ul>");

        {
            document.write("<li>" + array[i] + "</li>");

            sum = sum + array[i];

        }
        document.write("</ul>");
        document.write("total sum :"+ sum + "<br>");
        document.write("<br>");
        document.write("<br>");
        document.write("<br>");
        document.write("<br>");

        //another example of array...

        var array=["Muskan","hanzla","alisha","umer","noor"];

        for(var x=0;x<5;x++)
        {
            document.write(array[x] + " <br>");

        }
    </script>
