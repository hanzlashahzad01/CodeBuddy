<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #outside{
            border: 1px solid black;
            width: 300px;
            height: 300px;
            background-color: teal;
            margin-left: 450px;
            margin-top: 100px;
            line-height: 60px;
            color: #eee;
            font-size: 30px;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            padding-left: 20px;

        }
        #inside{
            border: 1px solid black;
            width: 200px;
            height: 200px;
            background-color: brown;
            padding-left: 20px;
        }
        
    </style>
</head>
<body>
    <div id="outside">
        Outside
        <div id="inside">
            Inside
        </div>
    </div>

    <script>

        // use capture property add event listener method ky sath hi use hota ha 
        // is ki value true ya false hoti false property is ki default property hoti ha

        var element;
        document.getElementById("outside").addEventListener("click",function(){
            alert("outside");
        },true);
        document.getElementById("inside").addEventListener("click",xyz,true);
        function xyz(){
            alert("inside");
        }

        

    </script>
</body>
</html>
