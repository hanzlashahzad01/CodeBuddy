        <title>new tab by java</title>
        <script>
/*there are the eight types of arthematic operators
1=+,2=-,3=*,4=/,5=%,6=++,7=**,8=--
1 called addition
2 called....4
5 called modulus
6 called increment
7 called expontiations
8 called decrement*/

      var a=16;
       var b=4;
       document.write(a+b);

       document.write(a-b );

       document.write(a**2);

       var c=12;
       var d=5;
       c++;
       document.write(c+d);
       var e=10;
       var z=10;
       e--;
       document.write(e-z);

        </script>
