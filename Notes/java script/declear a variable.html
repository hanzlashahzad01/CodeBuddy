<html>
    <head>
        <title>java new tab</title>
        <script>
/*there are the three types of a variable in a java script
(1):var  =var mia ap value ko modify bhi kar sekty hain or overwrite bhi.
(2):let  =let mia ap value ko modify nai kar sekty but overwrite kar sekty hain.
(3):const =const mia modify bhi nai kar sekhty or na hi overwrite kar sekty hain. /*
        </script>
    </head>
    <body>
        <script>
            //the function of var working
            var x=1234;
            //overwrite:
            var x="hanzla shahzad";
            document.write(x);
            //let function:
            let y="hanzla shahzad";
            let z=12123;
document.write(z + "<br>");
            document.write(y);
            const h="hanzla";
            const i=3317631;
            document.write(i + "<br>");
            document.write(h);
        </script>
        
    </body>
</html>
