<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //concat or join function....

       
        //concat function....
        /* concat funtion mean that merge karna merge karny ko concat khaty hain
        example 2 array ko jor kar aik hi array bana....*/ 

        var a=["umer","raza","salman","bilal"];

        var b=["nouman","hanzla","shahzad","arham"];
        
        var c = a.concat(b);
        
        document.write(c + "<br><br>");

        //join function....
        // the work of join function is all the value of array makes a string.... 


        var a=["umer","raza","salman","bilal"];

        var b=["nouman","hanzla","shahzad","arham"];
        
        var c = a.concat(b);
        
        document.write(c + "<br><br>");

        var d = c.join("-");
        document.write(d);

    </script>
</body>
</html>
