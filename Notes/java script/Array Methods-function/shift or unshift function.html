<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //shift or unshift function....

        var a=["raza","harry","alisha","noor"];
        document.write(a +"<br><br>");

        //shift function....

        /*shift function bilkul pop function kay ult hota ha
         pop jo hota ha wo last value ko delete karta tha
         lakin jo shift function ha ye pop ka reverse ha
         ye first value ko delete karta ha....*/

         a.shift();
         document.write(a + "<br><br>");

         //unshift function....

         /*unshift function bilkul push function ka reverse hi ha 
         push function mia value last pr add hoti thi
         lakin unshift mia value first mia hi add ho jati ha....*/ 

         a.unshift("bilal");
         document.write(a +"<br><br>");

         
         
    </script>
</body>
</html>
