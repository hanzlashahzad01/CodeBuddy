<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       
       //math methods ye methods sb websites pr work nai karty ye animation ya vedio games kay sath
       
        //use karty hain in ko.....

        // 1): ceil function....
       
        //ye ceil function decimal value kay sath hi work karta ha yani points values kay sath 
       
        //ye round about kar kay upper value baaty ga.....

        var a=Math.ceil(2.7);

        document.write(a + "<br>");

        // 2): floor function....

        // ye ceil function kay ult hi kaam karta ha ceil function round about kar kay upword value print
       
        //karta tha lakin ye floor function downword value ko print karta ha....
         // - mia value ko ye upword print kary ga....
        
        var a=Math.floor(2.76);

        document.write(a + "<br>");


        // 4): round function....
        
        // ye round about kar kay upword value ko print karta ha jo 50 sey value kam ho 
       
        //gi us ko ye round about nai kary ga 50 sey up wali value ko hi round about kary ga

        var a=Math.round(2.49);

        document.write(a + "<br>");

        // 5): trunc function....

        //ye simply point kay baad wali value ko print hi nai karta......

        var a=Math.trunc(2.76);

        document.write(a + "<br>");

        // 6): max function....

        // ye highest value ko print karta ha bus....

        var a=Math.max(20,30,50,80);

        document.write(a + "<br>");

        // 7): min function....

        //ye same lowest value ko print kary ga bus....

        
        var a=Math.min(20,30,50,80);

        document.write(a + "<br>");

        // 8): saqure root function....

        // ye function number ka square root print karta ha....

        
        var a=Math.sqrt(64);

        document.write(a + "<br>");

        // 9): cube root function.....

        // ye function ka cube root find kar kay print karta ha....

        
        var a=Math.cbrt(125);

        document.write(a + "<br>");

        // 10): powerof function....

        // working pow(base,expotantion)  for example 4 base ha or 4 ki power 3 ye exponation ha...

        
        var a=Math.pow(4,3);

        document.write(a + "<br>");

        // 11): random function....

        // ye randomly kio bhi value ko print kar dey ga jab hum page ko refresh karin gy....

        //by defulte ye 0 sey 1 tak value ko print karta ha lakin ap bhi set kar sekhty hain 

        var a=Math.floor(Math.random() * 100 ) + 1;

        document.write(a + "<br>");

        // 12): absolute function....

        // ye absolute value ko hi print karta ha absolute means that kay as it is 
        // value ko print karta ha i think so....

        //only number ko print karta ha ye....

        
        var a=Math.abs(24.43);

        document.write(a + "<br>");

        // 13): pi function school wala function yr bahi wohi jis ki value 3.14 ha yaad aya kuch...

        var a=Math.PI;

        document.write(a + "<br>");







    </script>
</body>
</html>
