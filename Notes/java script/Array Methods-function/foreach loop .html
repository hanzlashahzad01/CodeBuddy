<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //forEach loop....

        /*foreach loop bhi aik loop ki tarah hi kam karta ha bus hum is mia inbulit function 
        or external function bana sekhty hain....
        */

        var a=["hanzla","salman","nouman","aslam"];

        a.forEach(loop);
        
        function loop(value,index)
        {
            document.write(index +" : "+value+ "<br>");
        }
    </script>
</body>
</html>
