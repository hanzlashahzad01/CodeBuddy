<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //pop and push function of array...

        var a=["hanzla","shahzad","salman","khan"];

        document.write(a + "<br><br>");

        //pop function...
        //pop function target karta ha array ki last value ko...delete kar deyta ha khudhi....
        
        a.pop();
        document.write(a + "<br><br>");

        //push function....
        /*push function sey hum array mia aik or value ko add kar sekhty hain
         jo kay wo last par ay gi na kay fist pr....*/

         a.push("king");
         document.write(a + "<br><br>");

         a.push("bhai log");
         document.write(a + "<br><br>");


         
         
    </script>
</body>
</html>
