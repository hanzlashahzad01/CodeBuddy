<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        //functions/methods of array there are 34 array methods....

        var a=["hanzla","shahzad","arham","chaudhary"];

        document.write(a + "<br><br>");

        //sort this array...
        //the meaning of sorting is to arrange in order form...

        a.sort();
        document.write(a + "<br><br>");

        //reverse this array...
        //the meaning of reverse is jo ap na array declear ki ha us ka ulta ho jaiy....

        a.reverse();
        document.write(a + "<br><br>");
        



    </script>
    
</body>
</html>
