    <script>
        //indexof and indexlast function....

        //indexof function working....
        /*indexof ka function hum is laiya use karty hain kay 
        array mia sey kio bhi value ko search karny kay laiya
        kay aya wo value is array kay ander ha bhi kay nai agr
        ha to wo kider pari ha ye sb check karta ha....*/  

        /*agr jo value ap na enter ki ha search kay laiya 
        wo nai ha array mia to ye -1 print kary ga*/
        
        //method:-

        //indexOf(search item name,start);

        var a=["hanzla","alisha","aresha","umer","hanzla"];

        document.write(a + "<br><br>");

        var b=a.indexOf("hanzla",3);

        document.write(b + "<br><br>");

        //last indexof function working....

        /*ye same indexof ki tarah hi work karta ha bus difference
         ye ha kay ye lastsey value ko check karna start kary ga.....*/

         //method:-
         //same method as it is indexof function....

         var x=["hanzla","alisha","aresha","umer","hanzla"];

         document.write(x + "<br><br>");

         var y=x.lastIndexOf("aresha",2);

         document.write(y + "<br><br>");




        
    </script>
