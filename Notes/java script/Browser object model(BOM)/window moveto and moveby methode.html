<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="openWindow()">openWindow</button>
    <button onclick="windowmove()">Windowmove</button>

    <script>
        var mywindow;

        function openWindow(){

            mywindow=window.open("","","width=300px,height=100px,top=200px,left=150px");
            mywindow.document.write("<p>This is jusst text.</p>");

        }

        // is ko mia apni hi website sey khud set nai kar sekhta other user use kar sekhty hain mia khud nai

        function windowmove(){
            mywindow.moveTo(200,200);
            mywindow.focus();
        }

        //moveby moveto ki tarah hi work karta ha bus ye div ko thora zayada move kar deyta ha...


        function windowmove(){
            mywindow.moveBy(200,200);
            mywindow.focus();
        }
    </script>
</body>
</html>
