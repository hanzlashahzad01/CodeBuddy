<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body onresize="resizefunction()">
    <script>

        // window height and width methods...

        // there are four methods (1) innerheight (2) outerheight (3) innerwidth (4) outerwidth...

        function resizefunction()
        
        {

        console.clear();


        var iheight=window.innerHeight;
        console.log("inner height : "  + iheight);

        var oheight=window.outerHeight;
        console.log("outter height : "  + oheight);

        var iwidth=window.innerWidth;
        console.log("inner width : "  + iwidth);

        var owidth=window.outerWidth;
        console.log("outter width : "  + owidth);
        }
       


    </script>
</body>
</html>
