<html>
		<head>
		<title>backfree-visibility</title>
					<style>
					body{
					font-family:arial helvetica;
					background:#eee;
					
					}
				 .card{
					width:300px;
					height:300px;
					border:0px solid red;
					position:absolute;
					left:50%;
					top:50%;
					margin:-150px;
					perspective:500px;
					
					
					}
					.card:hover .content{
					transform:rotateY(180deg);
					
					}
					.content{
					width: 100%;
					height: 100%;
					position:absolute;
					transition:transform 1s;
					transform-style:preserve-3d;
					}
					.front,
					.back{
					width: 100%;
					height: 100%;
					position:absolute;
					background:#fff;
					color:tomato;
					text-align:center;
					font-size:60px;
					line-height:300px;
					border-radius:5px;
					backface-visibility:hidden;
					}
					.back{
					background:tomato;
					color:#fff;
					transform: rotateY(180deg);
					
					}
					
					


					</style>
		</head>
	<body>
	<h1 style="margin-bottom:50px;">CH.HANZLA SHAHZAD</h1>
	<div class="card">
	<div class="content">
	<div class="front">front</div>
	<div class="back">back</div>
	</div>
	
	
	
	
	</div>


	</body>



</html>
