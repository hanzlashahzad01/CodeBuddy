<html>
		<head>
		<title>css transition</title>
				<style>
				#box{
				width:150px;
				height:150px;
				background:pink;
				/*/transition-property:all;
				transition-duration:2s;
				transition-timing-function: ease-in; 
				transition-delay:3s;/*/
				transition: 1s linear 1s;
				margin-bottom:60px;
		
				} 
				#box:hover{
				width:300px;
				height:300px;
				background:orange;
				}
				input{
				width:150px;
				transition:width 1.5s;
				
				}
				input:focus{
				width:300px;
				}
	
				@media only screen and (max-width:960px){
				#box{
				width: 400px;
				height: 400px;
				background:green;
				}
				
				}


				</style>


		</head>
	<body>

<div id="box"></div>
<input type="password">
	</body>

</html>
