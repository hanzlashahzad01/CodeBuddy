<html>
	<head>
	<title>@media Query</title>
				<style>
			body{
				background:white;
				font-family:arial;
				}
	@media screen and (max-width:1200px){

	body{
					background:pink;
					font-size:55px;
	}
	
	}
	
	@media screen and (max-width:1000px){

	body{
					background:blue;
					font-size:75px;
	}
	
	}
	@media screen and (max-width:700px){

	body{
					background:red;
					font-size:95px;
	}
	
	}
	@media screen and (max-width:600px){
	body{
	background:green;
	font-size:120px;
	}
	}
	@media screen and (max-width:400px){
	body{
	background:white;
	font-size:10px;
	}
	}

				</style>

	</head>

<body>
<h1>CSS @media Qurey</h1>


</body>



</html>
