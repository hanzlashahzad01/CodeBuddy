<html>
	<head>
		<title>attribute function</title>
				<style>

h1{
font-size:25px;margin-bottom:50px;
}
p::after{
content: attr(data-caption);
color:green;
background:yellow;
}

				</style>
	</head>
<body>
<h1>learn css and html version 5</h1>

<p class="hanzla" data-caption="shahzad">hanzla</p>




</body>


</html>
