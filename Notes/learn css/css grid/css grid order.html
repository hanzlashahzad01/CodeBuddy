<html>
<head>
    <title>grid order</title>
            <style>

.container{
                    background: #eee;
                    width: 80%;
                        
                        margin: 50px 0px 0px 50px;
                display: grid;
                grid-template-columns:repeat(auto-fit,minmax(200px,150px));


                    grid-template-rows:repeat(2,150px);

        
    
                       
                }
                .item1{
                    background: yellow;
                    order: 2;
                }
                .item2{
                    background: brown;
                    order: 6;
                    
                }
                .item3{
                    background: skyblue;
                    order: 6;
                   
                }
                .item4{
                    background: purple;
                    order: 6;
                    
                }
                .item5{
                    background: green;
                    order:3;
                }
                .item6{
                    background: gold;
                    order: 2;
                   
                }
                
                
                



        </style>

</head>

        <body>
                <h1>ch.hanzla shahzad learn css</h1>
                <div class="container">
                        <div class="item1">first</div>
                            <div class="item2">second</div>
                                <div class="item3">third</div>
                        <div class="item4">four</div>
                        <div class="item5">five</div>
                        <div class="item6">six</div>
                        
                </div>


        </body>




</html>
