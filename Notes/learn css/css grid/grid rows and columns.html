<html>
<head>
    <title>css-grid</title>
            <style>
                .container{
                    background: #eee;
                    width: 700px;
                        
                        margin: 50px 0px 0px 50px;
                        display: grid;
grid-template-columns:200px 50% auto;
grid-template-rows: 300px 180px 1fr;
                }
                .item1{
                    background: yellow;
                }
                .item2{
                    background: brown;
                }
                .item3{
                    background: skyblue;
                }
                .item4{
                    background: purple;
                }
                .item5{
                    background: green;
                }
                .item6{
                    background: gold;
                }
                
                
                





        </style>

</head>

        <body>
            <h1>ch.hanzla shahzad learn css</h1>
                <div class="container">
                        <div class="item1">first</div>
                        <div class="item2">second</div>
                        <div class="item3">third</div>
                        <div class="item4">fourth</div>
                        <div class="item5">fiveth</div>
                        <div class="item6">sixth</div>
                </div>


        </body>




</html>
