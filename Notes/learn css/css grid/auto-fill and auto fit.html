            <style>

.container{
                    background: #eee;
                    width: 80%;
                        
                        margin: 50px 0px 0px 50px;
                display: grid;
                       grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
                    grid-template-rows:repeat(2,100px);

        grid-gap:15px ;
                        
    
                       
                }
                .item1{
                    background: yellow;
                }
                .item2{
                    background: brown;
                    
                }

                }

                    background: green;
                }
                .item6{
                    background: gold;
                   
                }
                .item7{
                    background: blueviolet;
                    
                }
                .item8{
                    background: brown;
                }
                
                
                



        </style>

</head>

        <body>

                <div class="container">

                </div>

</html>
