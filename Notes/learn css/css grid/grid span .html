<html>
<head>
    <title>grid span</title>
            <style>
                .container{
                    background: #eee;
                    width: 700px;
                        
                        margin: 50px 0px 0px 50px;
                       display: grid;
                       grid-template-columns:250px 220px auto;
                       grid-template-rows: 100px 100px auto ;

                       
                       grid-gap:5px 8px ;
                }
                .item1{
                    background: yellow;
                    
                }
                .item2{
                    background: brown;
                    grid-row:1/2;
                    grid-column:2/1;
                }
                .item3{
                    background: skyblue;
                    grid-row:2
                    -1;
                grid-columns:4/-1;
                }
                .item4{
                    background: purple;
                    


                }
                .item5{
                    background: green;
                    
                }
                .item6{
                    background: gold;
                }
                
                
                





        </style>

</head>

        <body>
            <h1>ch.hanzla shahzad learn css</h1>
                <div class="container">
                        <div class="item1">first</div>
                        <div class="item2">second</div>
                        <div class="item3">third</div>
                        <div class="item4">fourth</div>
                        <div class="item5">fiveth</div>
                        <div class="item6">sixth</div>
                </div>


        </body>




</html>
