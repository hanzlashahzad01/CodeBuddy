<html>
<head>
    <title>grid alignment</title>
            <style>

.container{
                    background: #eee;
                    width: 700px;
                        
                        margin: 50px 0px 0px 50px;
                       display: grid;
                       grid-template-columns:repeat(2, 1fr);
grid-template-rows:repeat(2,120px);

                       
    grid-gap:15px ;
                       grid-auto-rows: 70px;
                      /*align-items: start;
                      justify-items: start;*/
                      place-items: center center;
                      
                }
                .item1{
                    background: yellow;
                }
                .item2{
                    background: brown;
                    /*align-self: end;
                    justify-self:end;*/
                    place-items:start end;
                }
                .item3{
                    background: skyblue;
                    grid-row: span 3;
                }
                .item4{
                    background: purple;
                }
                .item5{
                    background: green;
                }
                .item6{
                    background: gold;
                }
                .item7{
                    background: burlywood;
                    grid-column: span 2;
                }
                .item8{
                    background: rgb(230, 176, 194);
                }
                
                
                



        </style>

</head>

        <body>
                <h1>ch.hanzla shahzad learn css</h1>
                <div class="container">
                        <div class="item1">first</div>
                        <div class="item2">second</div>
                        <div class="item3">third</div>
                        <div class="item4">fourth</div>
                        <div class="item5">fiveth</div>
                        <div class="item6">sixth</div>
                        <div class="item7">seventh</div>
                        <div class="item8">eightth</div>
                </div>


        </body>




</html>
