<html>
<head>
<title>mix blend mode</title>
<style>
body{
font-family:arial;

}
#test{
width:1500;
height:440;
border:10px solid black;

}
h2{
font-size:150px;
margin-top:0;

}
h2.first{
color:red;

}

h2.second{
color:gold;

margin-top:-250px;
margin-left:5px;
mix-blend-mode:hue;
}
</style>

</head>

<body>
<h1>learn css</h1>

<div id="test">
<h2 class="first">ch.hanzla shahzad</h2>
<h2 class="second">ch.hanzla shahzad</h2>
</div>

</body>

</html>
