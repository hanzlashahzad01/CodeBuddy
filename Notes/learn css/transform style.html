<html>
		<head>
		<title>transform style</title>
						<style>
						div{
						
						font-size:18px;
						text-align:center;
						box-sizing:border-box;
						
						}
						.parent{
						width:400px;
						height:250px;
						background:grey;
						margin:100px 0 0 70px 100px;
						perspective:800px;
						transform:rotatey(50deg);
						transform-style: preserve-3d;
						
						}
					
						
						
						
						#box{
						width:400px;
						height:250px;
						background:pink;
						padding-top:20px;
						transform:rotatex(60deg);
						transform-origin:bottom;
						}
						
						



						</style>

		</head>
	<body>
	<h1 style="margin-bottom:50px">transform style</h1>
	<div class="parent">
	<div id="box">yahoo baba</div>
	</div>



	</body>


</html>
