<html>
	<head>
		<title>after and before</title>
				<style>

h1{
font-size:25px;margin-bottom:50px;
}
p::before{
content:"HANZLA ";
background:wheat;
color:green;
display:block;
margin-bottom:15px;
}
p:hover::after{
content:"SHAHZAD ";
background:yellow;
color:pink;
display:block;
margin-bottom:15px;

}

				</style>
	</head>
<body>
<h1>learn css and html version 5</h1>

<p>Etiam vel eros suscipit, consectetur ex sed, maximus ipsum.</p>



</body>


</html>
